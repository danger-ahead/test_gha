name: Analyze and Test

on:
  workflow_dispatch:
  pull_request:
    types: [opened, ready_for_review]
    branches-ignore:
      - development
  issue_comment:
    types: [created]

jobs:
  analyze_and_test:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/test'))
    runs-on: mobile-2xlarge-ondemand-runner
    steps:
      - name: Get PR head SHA
        if: github.event_name == 'issue_comment'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && steps.pr.outputs.head_sha || github.sha }}

      - name: Read hello.txt
        id: hello
        run: |
          content=$(cat hello.txt)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event_name == 'pull_request' || github.event_name == 'issue_comment'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ### hello.txt

            ```
            ${{ steps.hello.outputs.content }}
            ```
          comment-tag: hello-txt
